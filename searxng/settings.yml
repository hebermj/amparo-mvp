# SearXNG Configuration for Amparo MVP v2

use_default_settings: true

general:
  instance_name: "Amparo SearXNG"
  debug: false
  privacypolicy_url: false
  contact_url: false
  enable_metrics: true

search:
  safe_search: 0
  autocomplete: ""
  language: "pt-BR"
  formats:
    - html
    - json

server:
  secret_key: "amparo_searxng_secret_change_in_production"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false
  # CORS for internal API access
  cors:
    allowed_origins:
      - "*"

engines:
  # General Web Search
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  # Shopping specific
  - name: google shopping
    engine: google_play
    shortcut: gshop
    disabled: false

  # Allow product price comparisons
  - name: "google images"
    engine: google_images
    shortcut: g_img
    disabled: true

outgoing:
  request_timeout: 5.0
  max_request_timeout: 10.0
  useragent_suffix: "Amparo/1.0"
  # Tor/proxy not needed for MVP
  proxies: {}
